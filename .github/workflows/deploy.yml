name: Deploy

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create archive
        run: |
          printf '%s\n' "${{ secrets.ENV_FILE }}" > deploy.env
          tar -czf /tmp/deploy.tar.gz \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=.next \
            --exclude=.env \
            --exclude=.env.local \
            --exclude=.env.dev \
            .
          cp /tmp/deploy.tar.gz .

      - name: Upload archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 79.174.14.175
          username: evspc
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          fingerprint: SHA256:Qr2NxYB/EC3iS4rP0ls1GVLa/2onA0WUC1GoHQJOkNc
          source: "deploy.tar.gz"
          target: "/tmp"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 79.174.14.175
          username: evspc
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          fingerprint: SHA256:Qr2NxYB/EC3iS4rP0ls1GVLa/2onA0WUC1GoHQJOkNc
          script_stop: true
          script: |
            mkdir -p /var/www/evspc/data/www/evspc.com
            cd /var/www/evspc/data/www/evspc.com

            # Single rolling backup of the current build (project is heavy — keep only one)
            rm -rf .next_bak
            [ -d .next ] && mv .next .next_bak

            # Remove old source files, keep node_modules for faster installs
            find . -mindepth 1 -maxdepth 1 ! -name 'node_modules' ! -name '.next_bak' -exec rm -rf {} + 2>/dev/null

            tar -xzf /tmp/deploy.tar.gz
            rm -f /tmp/deploy.tar.gz

            mv deploy.env .env

            npm install

            if npm run build; then
              rm -rf .next_bak
            else
              # Build failed — restore the previous build so the site keeps working
              rm -rf .next
              [ -d .next_bak ] && mv .next_bak .next
              exit 1
            fi

            pm2 startOrReload ecosystem.config.js --update-env
